name: publish

# Build + push the container image to ghcr.io on every semver tag (v0.x.y).
# Synology / production NAS pulls from ghcr.io, no on-NAS rebuild ever.
#
# Release flow:
#   git tag v0.1.0
#   git push origin v0.1.0     # triggers this workflow
#
# On the NAS:
#   sudo docker compose pull paperless-rules && sudo docker compose up -d paperless-rules

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:           # allow manual rebuilds of latest from main

permissions:
  contents: read
  packages: write              # required for ghcr.io push (uses GITHUB_TOKEN, no extra secret)

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3      # for arm64 cross-build

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64    # Synology NAS = arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
